<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Backstage</title>
<style>
  /* ─── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:      #0a0f1e;
    --bg-base:      #0f172a;
    --bg-elevated:  #1a2035;
    --bg-card:      #1e2847;
    --bg-hover:     #243058;
    --border:       rgba(99,120,200,0.12);
    --border-bright: rgba(99,120,200,0.28);
    --text-primary: #f1f5f9;
    --text-secondary: #a0aec0;
    --text-dim:     #5a6a8a;
    --text-work:    #7a8baa;

    /* Character colors */
    --color-boss:       #60A5FA;
    --color-client:     #F472B6;
    --color-explore:    #34D399;
    --color-oracle:     #A78BFA;
    --color-sisyphus:   #FB923C;
    --color-frontend:   #F9A8D4;
    --color-document:   #FCD34D;
    --color-librarian:  #6EE7B7;
    --color-prometheus: #93C5FD;
    --color-qa:         #FCA5A5;
    --color-momus:      #C4B5FD;
    --color-metis:      #A5B4FC;
    --color-default:    #94a3b8;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 22px;

    --shadow-msg: 0 2px 16px rgba(0,0,0,0.4);
    --shadow-glow-sm: 0 0 12px;

    --font-ui: -apple-system, 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.55;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Animated Background ───────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(30,50,120,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 80%, rgba(80,30,120,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(15,25,60,0.3) 0%, transparent 70%);
    animation: bgShift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgShift {
    0%   { opacity: 1; }
    50%  { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* ─── Layout Shell ──────────────────────────────────────────── */
  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ─── Header ────────────────────────────────────────────────── */
  #header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,30,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  #header-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #header-title .clapboard {
    font-size: 18px;
    animation: clapboard 6s ease-in-out infinite;
  }

  @keyframes clapboard {
    0%, 90%, 100% { transform: rotate(0deg); }
    92% { transform: rotate(-8deg); }
    95% { transform: rotate(6deg); }
    97% { transform: rotate(-4deg); }
  }

  #header-spacer { flex: 1; }

  #agent-count {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px 3px 8px;
  }

  #agent-count-num {
    color: var(--text-primary);
    font-weight: 600;
  }

  #status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse-dot 2.4s ease-in-out infinite;
    flex-shrink: 0;
  }

  #status-dot.disconnected {
    background: #ef4444;
    animation: blink-dot 1s step-end infinite;
  }

  #status-dot.reconnecting {
    background: #f59e0b;
    animation: pulse-dot 0.8s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50%       { opacity: 0.7; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }

  @keyframes blink-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  #conn-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  /* ─── Chat Area ─────────────────────────────────────────────── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar {
    width: 4px;
  }
  #chat::-webkit-scrollbar-track {
    background: transparent;
  }
  #chat::-webkit-scrollbar-thumb {
    background: rgba(99,120,200,0.25);
    border-radius: 2px;
  }
  #chat::-webkit-scrollbar-thumb:hover {
    background: rgba(99,120,200,0.45);
  }

  /* ─── Empty State ───────────────────────────────────────────── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    animation: fadeIn 0.6s ease;
    padding: 40px;
    text-align: center;
  }

  #empty-state .big-icon {
    font-size: 48px;
    opacity: 0.4;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  #empty-state p {
    font-size: 13px;
    opacity: 0.5;
    line-height: 1.8;
  }

  /* ─── Time Separator ────────────────────────────────────────── */
  .time-separator {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 10px;
    opacity: 0.35;
    animation: fadeIn 0.4s ease;
  }

  .time-separator::before,
  .time-separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-bright);
  }

  .time-separator span {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* ─── Message Group ─────────────────────────────────────────── */
  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 3px;
    animation: slideUp 0.28s cubic-bezier(0.34,1.3,0.64,1) both;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(14px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* msg-fade disabled — 메시지가 흐려지지 않음 */

  /* ─── Message Row ───────────────────────────────────────────── */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 2px 0;
  }

  .msg-row.right {
    flex-direction: row-reverse;
  }

  /* ─── Avatar ────────────────────────────────────────────────── */
  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex-shrink: 0;
    border: 2px solid transparent;
    transition: transform 0.2s cubic-bezier(0.34,1.6,0.64,1);
    position: relative;
  }

  .avatar.bounce {
    animation: avatarBounce 0.5s cubic-bezier(0.34,1.7,0.64,1);
  }

  @keyframes avatarBounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.28) rotate(-4deg); }
    60%  { transform: scale(0.92) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .avatar-placeholder {
    width: 38px;
    flex-shrink: 0;
  }

  /* ─── Bubble Container ──────────────────────────────────────── */
  .bubble-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: min(420px, calc(100% - 80px));
    min-width: 0;
  }

  .msg-row.right .bubble-wrap {
    align-items: flex-end;
  }

  /* ─── Speaker Meta ──────────────────────────────────────────── */
  .speaker-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 4px;
  }

  .speaker-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .role-badge {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1.5px 6px;
    border-radius: 20px;
    opacity: 0.75;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }

  .msg-row:hover .msg-time {
    opacity: 1;
  }

  /* ─── Message Bubble ────────────────────────────────────────── */
  .bubble {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm);
    padding: 8px 13px;
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--text-primary);
    word-break: break-word;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-msg);
    transition: border-color 0.2s ease;
    border-left-width: 2.5px;
  }

  .msg-row.right .bubble {
    border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
    border-left-width: 1px;
    border-right-width: 2.5px;
    background: rgba(30,40,80,0.9);
    backdrop-filter: blur(8px);
  }

  .bubble:hover {
    border-color: var(--border-bright);
  }

  /* ─── Expandable long messages ─────────────────────────────── */
  .bubble.collapsed {
    max-height: 4.8em; /* ~3 lines */
    overflow: hidden;
    cursor: pointer;
  }

  .bubble.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2em;
    background: linear-gradient(transparent, var(--bg-elevated));
    pointer-events: none;
  }

  .msg-row.right .bubble.collapsed::after {
    background: linear-gradient(transparent, rgba(30,40,80,0.9));
  }

  .bubble-expand-btn {
    display: none;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 2px 8px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .bubble-expand-btn:hover {
    opacity: 1;
  }

  .bubble-expand-btn.visible {
    display: inline-block;
  }

  /* ─── Request type (right-aligned, glassy) ──────────────────── */
  .bubble.type-request {
    background: rgba(244,114,182,0.08);
    border-color: rgba(244,114,182,0.3);
    border-right-width: 2.5px;
    border-right-color: var(--color-client);
  }

  /* ─── Done type: success shimmer ────────────────────────────── */
  .bubble.type-done {
    animation: doneShimmer 0.7s ease forwards;
  }

  @keyframes doneShimmer {
    0%   { box-shadow: 0 0 0 rgba(52,211,153,0); }
    30%  { box-shadow: 0 0 22px rgba(52,211,153,0.4), 0 0 40px rgba(52,211,153,0.15); }
    100% { box-shadow: var(--shadow-msg); }
  }

  /* ─── Talk type (Chris 카드/첨부파일 스타일) ──────────────────── */
  .msg-talk-card {
    margin: 4px 0 4px 48px;
    padding: 8px 12px;
    background: rgba(96,165,250,0.06);
    border-left: 3px solid rgba(96,165,250,0.4);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-secondary);
    animation: slideUp 0.28s cubic-bezier(0.34,1.3,0.64,1) both;
    cursor: default;
    max-width: calc(100% - 60px);
  }

  .msg-talk-card .talk-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .msg-talk-card .talk-header .talk-name {
    font-weight: 600;
    color: var(--color-boss);
    font-size: 12px;
  }

  .msg-talk-card .talk-body {
    color: var(--text-primary);
    opacity: 0.85;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-talk-card .talk-body.collapsed {
    max-height: 3.1em;
    overflow: hidden;
    position: relative;
  }

  .msg-talk-card .talk-body.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1.5em;
    background: linear-gradient(transparent, rgba(96,165,250,0.06));
    pointer-events: none;
  }

  .msg-talk-card .talk-expand {
    font-size: 11px;
    color: var(--color-boss);
    opacity: 0.6;
    cursor: pointer;
    margin-top: 2px;
  }

  .msg-talk-card .talk-expand:hover {
    opacity: 1;
  }

  /* ─── Work type ─────────────────────────────────────────────── */
  .msg-work {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px 4px 0;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-work);
    letter-spacing: -0.01em;
    transition: opacity 0.3s ease, max-height 0.3s ease;
    max-height: 40px;
    overflow: hidden;
  }

  .msg-work.removing {
    opacity: 0;
    max-height: 0;
    padding: 0;
    margin: 0;
  }

  .msg-work.completed .work-dots {
    display: none;
  }

  .msg-work.completed .work-done-mark {
    display: inline;
    color: #34D399;
    font-size: 11px;
    margin-left: 4px;
  }

  .work-done-mark {
    display: none;
  }

  .msg-work.completed {
    opacity: 0.5;
  }

  /* ─── Work-done (완료 요약, 클릭 펼침) ─────────────────────── */
  .msg-work-done {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 4px 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: color-mix(in srgb, var(--color-boss) 70%, var(--text-work));
    cursor: pointer;
    border-left: 2px solid rgba(52,211,153,0.3);
    margin-left: 44px;
    transition: background 0.2s;
    border-radius: 0 4px 4px 0;
  }

  .msg-work-done:hover {
    background: rgba(52,211,153,0.06);
  }

  .msg-work-done .done-icon {
    color: #34D399;
    flex-shrink: 0;
  }

  .msg-work-done .done-detail {
    display: none;
    margin-top: 4px;
    padding: 6px 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    font-size: 10.5px;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }

  .msg-work-done .done-detail.visible {
    display: block;
  }

  .work-speaker {
    font-weight: 600;
    font-size: 11px;
    opacity: 0.8;
    flex-shrink: 0;
  }

  .work-icon {
    font-size: 13px;
    animation: workPulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes workPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.15); }
  }

  .work-text {
    opacity: 0.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .work-dots {
    display: inline-flex;
    gap: 3px;
    margin-left: 2px;
  }

  .work-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-work);
    animation: dot-bounce 1.2s ease-in-out infinite;
    display: inline-block;
  }

  .work-dots span:nth-child(2) { animation-delay: 0.2s; }
  .work-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%            { transform: translateY(-5px); opacity: 1; }
  }

  /* ─── Footer ────────────────────────────────────────────────── */
  #footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,15,30,0.7);
    backdrop-filter: blur(8px);
  }

  #footer-left {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-dim);
  }

  #conn-status-text {
    font-size: 11px;
    color: var(--text-dim);
  }

  #msg-count {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
  }

  /* ─── Toast Notification ────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,40,70,0.95);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-md);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34,1.3,0.64,1);
    z-index: 100;
    white-space: nowrap;
    backdrop-filter: blur(12px);
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Scroll to Bottom Button ───────────────────────────────── */
  #scroll-btn {
    position: fixed;
    bottom: 60px;
    right: calc(50% - 390px + 20px);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 50;
  }

  #scroll-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  #scroll-btn:hover {
    background: var(--bg-hover);
    border-color: rgba(99,120,200,0.5);
    transform: scale(1.08);
  }

  /* ─── Reconnect Banner ──────────────────────────────────────── */
  #reconnect-banner {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px;
    background: rgba(245,158,11,0.1);
    border-bottom: 1px solid rgba(245,158,11,0.25);
    font-size: 12px;
    color: #f59e0b;
    animation: fadeIn 0.3s ease;
  }

  #reconnect-banner.visible {
    display: flex;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(245,158,11,0.3);
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ─── Utility Animations ────────────────────────────────────── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ─── Responsive ────────────────────────────────────────────── */
  @media (max-width: 600px) {
    #app {
      max-width: 100%;
    }
    #chat {
      padding: 12px 14px 6px;
    }
    #scroll-btn {
      right: 16px;
    }
    .bubble-wrap {
      max-width: calc(100% - 60px);
    }
  }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <div id="header-title">
      <span class="clapboard">🎬</span>
      <span>Backstage</span>
    </div>
    <div id="header-spacer"></div>
    <div id="agent-count">
      <span>agents</span>
      <span id="agent-count-num">0</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div id="status-dot"></div>
      <span id="conn-label">connecting</span>
    </div>
  </header>

  <!-- Reconnect Banner -->
  <div id="reconnect-banner">
    <div class="spinner"></div>
    <span id="reconnect-text">Reconnecting...</span>
  </div>

  <!-- Chat -->
  <main id="chat">
    <div id="empty-state">
      <div class="big-icon">💬</div>
      <p>대화가 없습니다.<br>에이전트가 작업을 시작하면<br>여기에 표시됩니다.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer id="footer">
    <div id="footer-left">
      <div id="status-dot-footer" style="width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse-dot 2.4s ease-in-out infinite;"></div>
      <span id="conn-status-text">Connected</span>
    </div>
    <span id="msg-count">0 messages</span>
  </footer>
</div>

<!-- Scroll to bottom -->
<button id="scroll-btn" title="최신 메시지로">↓</button>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ─── Constants ─────────────────────────────────────────────────

const MAX_MESSAGES    = 100;
// FADE_AGE_MS removed — no fade
const SEP_GAP_SEC     = 30;              // time separator threshold
const RECONNECT_BASE  = 1000;
const RECONNECT_MAX   = 30000;

// Character → color mapping
const ROLE_COLORS = {
  boss:                'var(--color-boss)',
  client:              'var(--color-client)',
  explore:             'var(--color-explore)',
  'explore-medium':    'var(--color-explore)',
  'explore-high':      'var(--color-explore)',
  oracle:              'var(--color-oracle)',
  'oracle-medium':     'var(--color-oracle)',
  'oracle-low':        'var(--color-oracle)',
  'sisyphus-junior':   'var(--color-sisyphus)',
  'sisyphus-junior-low':  'var(--color-sisyphus)',
  'sisyphus-junior-high': 'var(--color-sisyphus)',
  'frontend-engineer': 'var(--color-frontend)',
  'frontend-engineer-low':  'var(--color-frontend)',
  'frontend-engineer-high': 'var(--color-frontend)',
  'document-writer':   'var(--color-document)',
  librarian:           'var(--color-librarian)',
  'librarian-low':     'var(--color-librarian)',
  prometheus:          'var(--color-prometheus)',
  'qa-tester':         'var(--color-qa)',
  momus:               'var(--color-momus)',
  metis:               'var(--color-metis)',
};

const ROLE_LABELS = {
  boss:                'boss',
  client:              'client',
  explore:             'explore',
  'explore-medium':    'explore',
  'explore-high':      'explore',
  oracle:              'oracle',
  'oracle-medium':     'oracle',
  'oracle-low':        'oracle',
  'sisyphus-junior':   'executor',
  'sisyphus-junior-low':  'executor',
  'sisyphus-junior-high': 'executor',
  'frontend-engineer': 'frontend',
  'frontend-engineer-low':  'frontend',
  'frontend-engineer-high': 'frontend',
  'document-writer':   'writer',
  librarian:           'librarian',
  prometheus:          'planner',
  'qa-tester':         'qa',
  momus:               'reviewer',
  metis:               'analyst',
  'orchestrator-sisyphus': 'boss',
  'multimodal-looker': 'vision',
};

function roleColor(role) {
  return ROLE_COLORS[role] || 'var(--color-default)';
}

function roleLabel(role) {
  return ROLE_LABELS[role] || role;
}

// ─── State ─────────────────────────────────────────────────────

const state = {
  messages:      [],    // raw message objects
  groups:        [],    // rendered group elements
  msgCount:      0,
  activeAgents:  new Set(),
  lastSpeaker:   null,
  lastEpoch:     null,
  connected:     false,
  evtSource:     null,
  retryDelay:    RECONNECT_BASE,
  retryTimer:    null,
  fadeTimer:     null,
  userScrolled:  false,
};

// ─── DOM refs ───────────────────────────────────────────────────

const $chat        = document.getElementById('chat');
const $empty       = document.getElementById('empty-state');
const $agentCount  = document.getElementById('agent-count-num');
const $statusDot   = document.getElementById('status-dot');
const $connLabel   = document.getElementById('conn-label');
const $connStatus  = document.getElementById('conn-status-text');
const $msgCount    = document.getElementById('msg-count');
const $scrollBtn   = document.getElementById('scroll-btn');
const $toast       = document.getElementById('toast');
const $banner      = document.getElementById('reconnect-banner');
const $bannerText  = document.getElementById('reconnect-text');

// ─── Helpers ────────────────────────────────────────────────────

function getColor(role) { return roleColor(role); }

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}

function hexToRgb(cssVar) {
  // Just return the CSS variable string for use in rgba()
  return cssVar;
}

function formatTime(ts) {
  if (!ts) return '';
  // ts is like "14:30:25"
  if (typeof ts === 'string' && ts.includes(':')) return ts.slice(0, 5);
  return ts;
}

function toastMsg(text, ms = 2800) {
  $toast.textContent = text;
  $toast.classList.add('show');
  clearTimeout($toast._t);
  $toast._t = setTimeout(() => $toast.classList.remove('show'), ms);
}

// ─── Scroll ─────────────────────────────────────────────────────

function isNearBottom() {
  return $chat.scrollHeight - $chat.scrollTop - $chat.clientHeight < 100;
}

function scrollToBottom(force = false) {
  if (force || !state.userScrolled) {
    requestAnimationFrame(() => {
      $chat.scrollTo({ top: $chat.scrollHeight, behavior: 'smooth' });
    });
  }
}

$chat.addEventListener('scroll', () => {
  const near = isNearBottom();
  state.userScrolled = !near;
  $scrollBtn.classList.toggle('visible', !near);
});

$scrollBtn.addEventListener('click', () => {
  state.userScrolled = false;
  $scrollBtn.classList.remove('visible');
  scrollToBottom(true);
});

// ─── Connection Status ──────────────────────────────────────────

function setConnected(connected) {
  state.connected = connected;
  $statusDot.className = connected ? '' : 'disconnected';
  $connLabel.textContent = connected ? 'live' : 'offline';
  $connStatus.textContent = connected ? 'Connected' : 'Disconnected';
  $banner.classList.toggle('visible', false);
}

function setReconnecting(attempt) {
  $statusDot.className = 'reconnecting';
  $connLabel.textContent = 'reconnecting';
  $connStatus.textContent = 'Reconnecting...';
  $banner.classList.add('visible');
  $bannerText.textContent = `Reconnecting... (attempt ${attempt})`;
}

// ─── Agent Tracking ─────────────────────────────────────────────

function updateAgentCount() {
  $agentCount.textContent = state.activeAgents.size;
}

// ─── Message Rendering ──────────────────────────────────────────

function createAvatar(speaker, role, visible) {
  if (!visible) {
    const ph = document.createElement('div');
    ph.className = 'avatar-placeholder';
    return ph;
  }

  const color = getColor(role);
  const el = document.createElement('div');
  el.className = 'avatar';
  el.textContent = initials(speaker);
  el.style.cssText = `
    background: color-mix(in srgb, ${color} 18%, #1a2035);
    border-color: ${color};
    color: ${color};
  `;
  return el;
}

function triggerAvatarBounce(avatarEl) {
  if (!avatarEl || !avatarEl.classList.contains('avatar')) return;
  avatarEl.classList.remove('bounce');
  void avatarEl.offsetWidth; // reflow
  avatarEl.classList.add('bounce');
}

function createSpeakerMeta(speaker, role, ts) {
  const color = getColor(role);
  const label = roleLabel(role);

  const el = document.createElement('div');
  el.className = 'speaker-meta';

  const nameEl = document.createElement('span');
  nameEl.className = 'speaker-name';
  nameEl.textContent = speaker || role;
  nameEl.style.color = color;

  const badgeEl = document.createElement('span');
  badgeEl.className = 'role-badge';
  badgeEl.textContent = label;
  badgeEl.style.cssText = `
    background: color-mix(in srgb, ${color} 15%, transparent);
    color: ${color};
    border: 1px solid color-mix(in srgb, ${color} 35%, transparent);
  `;

  const timeEl = document.createElement('span');
  timeEl.className = 'msg-time';
  timeEl.textContent = formatTime(ts);

  el.appendChild(nameEl);
  el.appendChild(badgeEl);
  el.appendChild(timeEl);
  return el;
}

function createWorkRow(msg) {
  const color = getColor(msg.role);

  const row = document.createElement('div');
  row.className = 'msg-row';
  row.style.marginLeft = '44px'; // indent under avatar space
  // Tag with speaker for cleanup on done
  if (msg.speaker) row.dataset.workSpeaker = msg.speaker;

  const workEl = document.createElement('div');
  workEl.className = 'msg-work';
  workEl.style.color = `color-mix(in srgb, ${color} 60%, var(--text-work))`;

  // Speaker name
  const speakerEl = document.createElement('span');
  speakerEl.className = 'work-speaker';
  speakerEl.textContent = msg.speaker || '';
  speakerEl.style.color = color;

  const iconEl = document.createElement('span');
  iconEl.className = 'work-icon';
  // Try to extract an emoji from the msg, otherwise use ⚙
  const emojiMatch = msg.msg && msg.msg.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u);
  iconEl.textContent = emojiMatch ? emojiMatch[0] : '⚙';

  const textEl = document.createElement('span');
  textEl.className = 'work-text';
  textEl.textContent = msg.msg ? msg.msg.replace(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)\s*/u, '') : '';

  const dotsEl = document.createElement('span');
  dotsEl.className = 'work-dots';
  dotsEl.innerHTML = '<span></span><span></span><span></span>';

  const doneEl = document.createElement('span');
  doneEl.className = 'work-done-mark';
  doneEl.textContent = '→ 완료';

  workEl.appendChild(speakerEl);
  workEl.appendChild(iconEl);
  workEl.appendChild(textEl);
  workEl.appendChild(dotsEl);
  workEl.appendChild(doneEl);
  row.appendChild(workEl);

  // 20초 후 완료 표시 (사라지지 않음)
  row._expireTimer = setTimeout(() => {
    workEl.classList.add('completed');
  }, 20000);

  return row;
}

function createBubble(msg, type) {
  const color = getColor(msg.role);
  const isRight = type === 'request';
  const text = msg.msg || '';

  const wrapper = document.createElement('div');

  const bubbleEl = document.createElement('div');
  bubbleEl.className = `bubble type-${type}`;
  bubbleEl.textContent = text;

  // Set left border color (character color)
  if (!isRight) {
    bubbleEl.style.borderLeftColor = color;
  }

  wrapper.appendChild(bubbleEl);

  // Long message: collapse + expand button
  if (text.length > 120) {
    bubbleEl.classList.add('collapsed');

    const btn = document.createElement('span');
    btn.className = 'bubble-expand-btn visible';
    btn.textContent = '펼치기 ▾';

    btn.addEventListener('click', () => {
      const isCollapsed = bubbleEl.classList.contains('collapsed');
      bubbleEl.classList.toggle('collapsed');
      btn.textContent = isCollapsed ? '접기 ▴' : '펼치기 ▾';
    });

    bubbleEl.addEventListener('click', () => {
      if (bubbleEl.classList.contains('collapsed')) {
        bubbleEl.classList.remove('collapsed');
        btn.textContent = '접기 ▴';
      }
    });

    wrapper.appendChild(btn);
  }

  return wrapper;
}

/**
 * Decide if a new group is needed:
 * - no existing groups
 * - different speaker/role
 * - previous or current message is a request (requests never group)
 */
function needsNewGroup(msg) {
  if (state.groups.length === 0) return true;
  if (state.lastSpeaker !== (msg.speaker + msg.role)) return true;
  const lastGroup = state.groups[state.groups.length - 1];
  if (lastGroup._lastType === 'request' || msg.type === 'request') return true;
  return false;
}

function renderMessage(msg, skipAnim = false) {
  const { type, speaker, role, ts, epoch } = msg;

  // Show empty state management
  if ($empty) {
    $empty.style.display = 'none';
  }

  // Time separator
  if (state.lastEpoch !== null && epoch && (epoch - state.lastEpoch) > SEP_GAP_SEC) {
    const sep = document.createElement('div');
    sep.className = 'time-separator';
    sep.innerHTML = `<span>${ts || ''}</span>`;
    $chat.appendChild(sep);
    state.lastSpeaker = null; // force new group after separator
  }

  if (epoch) state.lastEpoch = epoch;

  const isRight = type === 'request';
  const isWork  = type === 'work';

  // ── Talk type: Chris 카드/첨부파일 스타일 ───────────────────
  if (type === 'talk') {
    const card = document.createElement('div');
    card.className = 'msg-talk-card';
    if (skipAnim) card.style.animation = 'none';

    const header = document.createElement('div');
    header.className = 'talk-header';
    const nameEl = document.createElement('span');
    nameEl.className = 'talk-name';
    nameEl.textContent = speaker || 'Chris';
    const timeEl = document.createElement('span');
    timeEl.textContent = formatTime(ts);
    header.appendChild(nameEl);
    header.appendChild(timeEl);

    const body = document.createElement('div');
    body.className = 'talk-body';
    body.textContent = msg.msg || '';

    card.appendChild(header);
    card.appendChild(body);

    // 긴 메시지: 접기/펼치기
    if ((msg.msg || '').length > 80) {
      body.classList.add('collapsed');
      const expandBtn = document.createElement('div');
      expandBtn.className = 'talk-expand';
      expandBtn.textContent = '더보기';
      expandBtn.addEventListener('click', () => {
        const isCollapsed = body.classList.contains('collapsed');
        body.classList.toggle('collapsed');
        expandBtn.textContent = isCollapsed ? '접기' : '더보기';
      });
      card.appendChild(expandBtn);
    }

    $chat.appendChild(card);
    state.lastSpeaker = null;
    state.msgCount++;
    $msgCount.textContent = `${state.msgCount} message${state.msgCount !== 1 ? 's' : ''}`;
    scrollToBottom();
    return;
  }

  // ── Work-done type: 완료 요약 (클릭 펼침) ──────────────────
  if (type === 'work-done') {
    // 같은 speaker의 진행중 work 메시지 제거
    if (speaker) {
      const oldRows = $chat.querySelectorAll(`.msg-row[data-work-speaker="${speaker}"]`);
      oldRows.forEach(r => {
        if (r._expireTimer) clearTimeout(r._expireTimer);
        if (r._fadeTimer) clearTimeout(r._fadeTimer);
        r.remove();
      });
    }

    const row = document.createElement('div');
    row.className = 'msg-row';

    const el = document.createElement('div');
    el.className = 'msg-work-done';

    const icon = document.createElement('span');
    icon.className = 'done-icon';
    icon.textContent = '✓';

    const textWrap = document.createElement('div');
    const summary = document.createElement('span');
    summary.textContent = msg.msg || '';
    textWrap.appendChild(summary);

    if (msg.detail) {
      const detail = document.createElement('div');
      detail.className = 'done-detail';
      detail.textContent = msg.detail;
      textWrap.appendChild(detail);

      el.addEventListener('click', () => {
        detail.classList.toggle('visible');
      });
    }

    el.appendChild(icon);
    el.appendChild(textWrap);
    row.appendChild(el);

    if (skipAnim) row.style.animation = 'none';
    $chat.appendChild(row);

    state.lastSpeaker = null;
    state.msgCount++;
    $msgCount.textContent = `${state.msgCount} message${state.msgCount !== 1 ? 's' : ''}`;
    scrollToBottom();
    return;
  }

  // ── Work type: compact inline row ───────────────────────────
  if (isWork) {
    // Remove previous work rows for this speaker (keep only latest)
    if (speaker) {
      const oldRows = $chat.querySelectorAll(`.msg-row[data-work-speaker="${speaker}"]`);
      oldRows.forEach(r => {
        if (r._expireTimer) clearTimeout(r._expireTimer);
        if (r._fadeTimer) clearTimeout(r._fadeTimer);
        const w = r.querySelector('.msg-work');
        if (w) { w.classList.add('completed'); }
        setTimeout(() => {
          if (w) w.classList.add('removing');
          setTimeout(() => r.remove(), 300);
        }, 2000);
      });
    }

    const row = createWorkRow(msg);
    if (skipAnim) row.style.animation = 'none';
    $chat.appendChild(row);

    // Track active agents
    if (speaker && role !== 'boss' && role !== 'client') {
      state.activeAgents.add(speaker);
      updateAgentCount();
    }

    state.lastSpeaker = null; // work breaks grouping
    state.msgCount++;
    $msgCount.textContent = `${state.msgCount} message${state.msgCount !== 1 ? 's' : ''}`;
    scrollToBottom();
    return;
  }

  // ── Regular bubble ───────────────────────────────────────────
  let group, bubbleWrap, avatarEl;

  const startNewGroup = needsNewGroup(msg);

  if (startNewGroup) {
    group = document.createElement('div');
    group.className = 'msg-group';
    if (skipAnim) group.style.animation = 'none';

    // Limit DOM messages
    while ($chat.children.length >= MAX_MESSAGES + 10) {
      const oldest = $chat.querySelector('.msg-group, .msg-work, .time-separator');
      if (!oldest) break;
      oldest.remove();
      // Prune state.groups if the removed node was a group
      const idx = state.groups.indexOf(oldest);
      if (idx !== -1) state.groups.splice(idx, 1);
    }

    // Avatar + Bubble wrap row (first message in group)
    const firstRow = document.createElement('div');
    firstRow.className = `msg-row${isRight ? ' right' : ''}`;

    avatarEl = createAvatar(speaker, role, true);
    bubbleWrap = document.createElement('div');
    bubbleWrap.className = 'bubble-wrap';

    const meta = createSpeakerMeta(speaker, role, ts);
    bubbleWrap.appendChild(meta);

    const bubble = createBubble(msg, type);
    bubbleWrap.appendChild(bubble);

    if (isRight) {
      firstRow.appendChild(bubbleWrap);
      firstRow.appendChild(avatarEl);
    } else {
      firstRow.appendChild(avatarEl);
      firstRow.appendChild(bubbleWrap);
    }

    group.appendChild(firstRow);
    group._avatarEl = avatarEl;
    group._bubbleWrap = bubbleWrap;
    group._role = role;
    group._speaker = speaker;
    group._lastEpoch = epoch;
    group._lastType = type;

    $chat.appendChild(group);
    state.groups.push(group);

    // Bounce avatar on new group
    if (!skipAnim) triggerAvatarBounce(avatarEl);

  } else {
    // Append to existing group
    group = state.groups[state.groups.length - 1];
    avatarEl = group._avatarEl;
    bubbleWrap = group._bubbleWrap;

    const addRow = document.createElement('div');
    addRow.className = `msg-row${isRight ? ' right' : ''}`;

    const ph = document.createElement('div');
    ph.className = 'avatar-placeholder';

    const innerWrap = document.createElement('div');
    innerWrap.className = 'bubble-wrap';
    if (isRight) innerWrap.style.alignItems = 'flex-end';

    const bubble = createBubble(msg, type);
    innerWrap.appendChild(bubble);

    if (isRight) {
      addRow.appendChild(innerWrap);
      addRow.appendChild(ph);
    } else {
      addRow.appendChild(ph);
      addRow.appendChild(innerWrap);
    }

    group.appendChild(addRow);
    group._lastEpoch = epoch;
    group._lastType = type;
    if (!skipAnim) triggerAvatarBounce(avatarEl);
  }

  // Agent tracking + work row cleanup on done
  if (type === 'done' && speaker) {
    // Remove all work rows for this speaker (task finished)
    const doneRows = $chat.querySelectorAll(`.msg-row[data-work-speaker="${speaker}"]`);
    doneRows.forEach(r => {
      const w = r.querySelector('.msg-work');
      if (w) w.classList.add('removing');
      setTimeout(() => r.remove(), 300);
    });

    if (role !== 'boss' && role !== 'client') {
      state.activeAgents.delete(speaker);
      updateAgentCount();
    }
  } else if ((type === 'assign') && speaker && role !== 'boss' && role !== 'client') {
    state.activeAgents.add(speaker);
    updateAgentCount();
  }

  state.lastSpeaker = speaker + role;
  state.msgCount++;
  $msgCount.textContent = `${state.msgCount} message${state.msgCount !== 1 ? 's' : ''}`;
  scrollToBottom();
}

// ─── Fade disabled (메시지 항상 선명) ────────────────────────────

function startFadeTimer() {
  // no-op: fade 비활성
}

// ─── SSE Connection ─────────────────────────────────────────────

let retryAttempt = 0;

function connect() {
  if (state.evtSource) {
    state.evtSource.close();
    state.evtSource = null;
  }

  const url = `http://localhost:${location.port || 7777}/events`;
  let es;

  try {
    es = new EventSource(url);
  } catch (e) {
    scheduleRetry();
    return;
  }

  state.evtSource = es;

  es.addEventListener('connected', () => {
    setConnected(true);
    retryAttempt = 0;
    state.retryDelay = RECONNECT_BASE;
    toastMsg('🟢 Connected to Backstage');
  });

  es.addEventListener('message', (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg && msg.type && msg.speaker !== undefined) {
        state.messages.push(msg);
        renderMessage(msg);
      }
    } catch {}
  });

  es.addEventListener('ping', () => {
    // Keep-alive, do nothing
  });

  es.onerror = () => {
    es.close();
    state.evtSource = null;
    setConnected(false);
    scheduleRetry();
  };
}

function scheduleRetry() {
  retryAttempt++;
  const delay = Math.min(state.retryDelay * 1.5, RECONNECT_MAX);
  state.retryDelay = delay;
  setReconnecting(retryAttempt);

  if (state.retryTimer) clearTimeout(state.retryTimer);
  state.retryTimer = setTimeout(() => {
    connect();
  }, delay);
}

// ─── History Fetch ──────────────────────────────────────────────

async function fetchHistory() {
  try {
    const res = await fetch(`http://localhost:${location.port || 7777}/history`);
    if (!res.ok) return;
    const entries = await res.json();
    if (!Array.isArray(entries)) return;

    // Reset rendering state for history
    state.lastSpeaker = null;
    state.lastEpoch = null;

    for (const msg of entries) {
      if (msg && msg.type) {
        state.messages.push(msg);
        renderMessage(msg, true /* skipAnim */);
      }
    }

    // Scroll to bottom after history loaded
    requestAnimationFrame(() => {
      $chat.scrollTop = $chat.scrollHeight;
    });
  } catch {}
}

// ─── Init ───────────────────────────────────────────────────────

async function init() {
  await fetchHistory();
  connect();
  startFadeTimer();
}

init();
</script>
</body>
</html>
