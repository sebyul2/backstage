<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backstage v2.5</title>
<link rel="stylesheet" href="/css/game.css?v=2.6">
<script src="/js/lib/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function fitViewport() {
  var app = document.getElementById('app');
  if (!app) return;
  var sx = window.innerWidth / 1760;
  var sy = window.innerHeight / 720;
  var s = Math.min(sx, sy);
  app.style.transform = 'translate(-50%,-50%) scale(' + s + ')';
}
window.addEventListener('resize', fitViewport);
window.addEventListener('load', fitViewport);
document.addEventListener('DOMContentLoaded', fitViewport);
</script>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="title">BACKSTAGE v2.5</div>
  <div class="dots">Loading</div>
</div>

<!-- Main layout: Canvas + Chat -->
<div id="app">
  <div id="game-container">
    <canvas id="game"></canvas>
    <div id="scanlines"></div>
  </div>
  <div id="chat-log">
    <div class="chat-header">
      <span class="chat-title">CHAT</span>
      <span class="chat-indicator" id="chat-indicator"></span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
  </div>
</div>

<script type="module">
  // Error boundary
  window.onerror = (msg, src, line, col, err) => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#FC8181;font-size:14px;padding:20px;">
        Error: ${msg}<br>at ${src}:${line}
      </div>`;
  };

  try {
    await import('./js/main.js?v=2.6');
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#FC8181;font-size:14px;padding:20px;">
        Module load error: ${e.message}
      </div>`;
    throw e;
  }

  // Hide loading screen
  if (document.fonts) {
    document.fonts.ready.then(() => {
      setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) el.classList.add('hidden');
      }, 600);
    });
  } else {
    window.addEventListener('load', () => {
      const el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    });
  }
</script>

</body>
</html>
